<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | GF Comércio de Gás</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#fafafa",
              "secondary-fixed-dim": "#71717a",
              "secondary": "#71717a",
              "surface-bright": "#18181b",

              "on-secondary-fixed": "#18181b",

              "primary-container": "#7c3aed",

              "on-tertiary-fixed": "#003318",

              "surface-dim": "#0c0c0f",
              "on-secondary-container": "#a1a1aa",
              "primary-fixed": "#ede9fe",
              "tertiary-fixed": "#bbf7d0",
              "outline-variant": "#27272a",
              "on-tertiary-container": "#bbf7d0",

              "on-secondary": "#09090b",
              "inverse-primary": "#5b21b6",

              "surface": "#0c0c0f",
              "primary-fixed-dim": "#c4b5fd",
              "surface-container": "#121215",
              "tertiary-container": "#065f46",
              "tertiary": "#34d399",
              "on-tertiary-fixed-variant": "#047857",
              "on-tertiary": "#001a12",
              "tertiary-fixed-dim": "#6ee7b7",
              "secondary-container": "#27272a",
              "error-container": "#3b1111",
              "on-secondary-fixed-variant": "#3f3f46",
              "error": "#ef4444"
            },
            fontFamily: {
              "headline": ["Geist"],
              "body": ["Geist"],
              "label": ["Geist"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #09090b;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .grid-pattern {
            background-image: radial-gradient(#27272a 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 selection:bg-primary selection:text-on-primary">
<!-- Ambient Background Texture -->
<div class="fixed inset-0 grid-pattern opacity-20 pointer-events-none"></div>
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-64 bg-primary/5 blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md z-10">
<!-- Brand Identity Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container border border-outline-variant mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="local_gas_station">local_gas_station</span>
</div>
<h1 class="text-lg font-black text-on-surface tracking-tighter mb-1">GF Comércio de Gás</h1>
<p class="text-on-surface-variant text-sm tracking-tight font-medium">Bem-vindo de volta</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-8 shadow-2xl">
<form class="space-y-5" onsubmit="return false;">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">E-mail Corporativo</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 pl-10 pr-4 text-on-surface placeholder:text-secondary-fixed-dim focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-sm" id="email" placeholder="seu@email.com.br" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Senha</label>
<a class="text-[11px] font-bold text-primary hover:underline transition-all" href="#">Esqueceu a senha?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 pl-10 pr-4 text-on-surface placeholder:text-secondary-fixed-dim focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-primary/10" type="submit">
<span>Acessar Sistema</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative py-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-2 text-on-surface-variant font-medium">Ou continue com</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full bg-transparent border border-outline-variant hover:bg-surface-container-high text-on-surface font-bold py-3 rounded-lg flex items-center justify-center gap-3 transition-all active:scale-[0.98]" type="button">
<img alt="Google" class="w-5 h-5" data-alt="Google logo icon white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7s-CBqToa553v_PkGc_GZKgTvBndBA30jwDUyPyLpAenCHXy82Sy5nt_8O9uHibO47a42VUURXY7wq7vaIkn9oTq_TyrLPTLvb-K96C9gQ3M3rU_MGb2TavLIdRtyR039CMsL9zrqorO2JeaM3SwK2VBg1t-hRfOaF03jBu0xJLw7G7bNGL1bT2nA3Zhnecwc6MRIZ-vSMfGdn2FlstyNutnSLWyk5FOTpSwbDUM3-sQPqInE7t4yvd4BkWTpDCFDvJChSCRcW1Sw"/>
<span>Continuar com Google</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<div class="mt-8 text-center space-y-4">
<p class="text-sm text-on-surface-variant">
                Não tem uma conta? 
                <a class="text-primary font-bold hover:underline ml-1 transition-all" href="#">Criar agora</a>
</p>
<div class="flex items-center justify-center gap-6 opacity-40">
<span class="text-[10px] uppercase tracking-widest font-bold">Privacidade</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Termos</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Ajuda</span>
</div>
</div>
</main>
<!-- Support Bubble -->
<button class="fixed bottom-6 right-6 w-12 h-12 bg-surface-container border border-outline-variant rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 shadow-xl">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
</button>
</body></html>
